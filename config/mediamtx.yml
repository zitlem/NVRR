# MediaMTX base config — managed by NVRR backend
# Do not edit manually; the backend overwrites this file.

logLevel: info
logDestinations: [stdout]

api: yes
apiAddress: 127.0.0.1:9997

rtsp: yes
rtspAddress: :8554

rtmp: yes
rtmpAddress: :1935

hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsSegmentCount: 180
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsAllowOrigin: "*"

pathDefaults:
  source: publisher
  sourceOnDemand: no
  overridePublisher: yes

paths:
  all_others:
