<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVRR — Viewer</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
</head>
<body class="viewer-body">
    <div class="header">
        <div class="header-left">
            <button class="btn-icon sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">&#9776;</button>
            <h1>NVRR</h1>
        </div>
        <!-- View settings (inline in header, hidden when no custom view) -->
        <div class="view-bar" id="view-bar" style="display:none">
            <input type="text" id="view-name-input" class="view-name-edit" placeholder="View name">
            <label>Cols</label>
            <input type="number" id="view-cols" min="1" max="8" value="4" class="grid-size-input">
            <label>Rows</label>
            <input type="number" id="view-rows" min="1" max="8" value="3" class="grid-size-input">
            <button class="btn btn-sm btn-danger" id="delete-view-btn">Delete</button>
        </div>
        <nav>
            <a href="/" class="active">Viewer</a>
            <a href="/admin.html">Admin</a>
        </nav>
    </div>

    <div class="viewer-layout">
        <!-- Left Sidebar: split top/bottom -->
        <div class="left-sidebar" id="left-sidebar">
            <!-- Top: Views -->
            <div class="sidebar-panel sidebar-top" id="sidebar-top">
                <div class="panel-header">
                    <span>Views</span>
                    <button class="btn-icon" id="add-view-btn" title="New View">+</button>
                </div>
                <div class="panel-content" id="views-list"></div>
            </div>

            <!-- Resize handle -->
            <div class="sidebar-divider" id="sidebar-divider"></div>

            <!-- Bottom: Cameras (drag source) -->
            <div class="sidebar-panel sidebar-bottom" id="sidebar-bottom">
                <div class="panel-header">
                    <span>Cameras</span>
                </div>
                <div class="panel-content" id="camera-list"></div>
            </div>

            <!-- Settings -->
            <div class="sidebar-settings" id="sidebar-settings">
                <label class="setting-row">
                    <span>Pre-load</span>
                    <select id="stream-mode-select" title="Per-view setting — controls which streams are kept running for this view. Saved per browser.">
                        <option value="visible_sub">Visible cameras</option>
                        <option value="visible_both">Visible + HD ready</option>
                        <option value="all_sub">All cameras</option>
                        <option value="all_both">All cameras + HD ready</option>
                    </select>
                </label>
                <p class="setting-note">Setting is per view, per browser</p>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content" id="main-content">
            <div class="camera-grid" id="camera-grid"></div>
        </div>
    </div>

    <!-- PTZ Sidebar -->
    <div class="ptz-sidebar" id="ptz-sidebar">
        <h3 id="ptz-camera-name">PTZ Control</h3>
        <div class="dpad">
            <div class="empty"></div>
            <button data-pan="0" data-tilt="0.5">&#9650;</button>
            <div class="empty"></div>
            <button data-pan="-0.5" data-tilt="0">&#9664;</button>
            <div class="empty"></div>
            <button data-pan="0.5" data-tilt="0">&#9654;</button>
            <div class="empty"></div>
            <button data-pan="0" data-tilt="-0.5">&#9660;</button>
            <div class="empty"></div>
        </div>
        <div class="zoom-controls">
            <button data-zoom="0.5">+</button>
            <button data-zoom="-0.5">&minus;</button>
        </div>
        <h3>Presets</h3>
        <div class="presets-list" id="presets-list"></div>
    </div>

    <!-- Server disconnected overlay -->
    <div class="server-down-overlay" id="server-down-overlay">
        <div class="server-down-box">
            <div class="server-down-text">Server disconnected</div>
            <div class="server-down-bar"><div class="server-down-bar-inner"></div></div>
            <div class="server-down-sub">Reconnecting...</div>
        </div>
    </div>

    <script src="/js/viewer.js"></script>
</body>
</html>
