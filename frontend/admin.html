<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVRR — Admin</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Login overlay -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-box">
            <h2>Admin Login</h2>
            <input type="password" id="login-password" placeholder="Admin password" autofocus>
            <button class="btn btn-primary" style="width:100%" id="login-btn">Login</button>
            <p id="login-error" style="color:var(--danger);font-size:13px;margin-top:8px;display:none"></p>
        </div>
    </div>

    <div class="header">
        <h1>NVRR</h1>
        <nav>
            <a href="/">Viewer</a>
            <a href="/admin.html" class="active">Admin</a>
        </nav>
    </div>

    <div class="admin-container" id="admin-content" style="display:none">
        <!-- Network Discovery -->
        <div class="card">
            <h2>Network Discovery</h2>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
                <button class="btn btn-primary" id="scan-btn">Scan Network</button>
                <span id="scan-status" style="font-size:13px;color:var(--text-dim)"></span>
            </div>
            <table id="discovered-table" style="display:none">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>IP</th>
                        <th>Model</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="discovered-table-body"></tbody>
            </table>
        </div>

        <!-- Add NVR -->
        <div class="card">
            <h2>Add NVR Manually</h2>
            <div class="form-row">
                <div class="field">
                    <label>IP Address</label>
                    <input type="text" id="nvr-ip" placeholder="192.168.1.64">
                </div>
                <div class="field">
                    <label>HTTP Port</label>
                    <input type="number" id="nvr-port" value="80" style="width:80px">
                </div>
                <div class="field">
                    <label>SDK Port(s)</label>
                    <input type="text" id="nvr-sdk-port" placeholder="auto" style="width:120px" title="Single port, comma-separated ports to probe, or blank for auto">
                </div>
                <div class="field">
                    <label>Username</label>
                    <input type="text" id="nvr-user" placeholder="admin">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="nvr-pass" placeholder="password">
                </div>
                <button class="btn btn-primary" id="add-nvr-btn">Add NVR</button>
            </div>
            <p id="add-nvr-status" style="font-size:13px;margin-top:8px;display:none"></p>
        </div>

        <!-- NVR List -->
        <div class="card">
            <h2>NVRs</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>IP</th>
                        <th>SDK Port</th>
                        <th>Cameras</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="nvr-table-body"></tbody>
            </table>
        </div>

        <!-- Factory Reset -->
        <div class="card">
            <h2>Factory Reset</h2>
            <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px">Delete all NVRs, cameras, and settings. This cannot be undone.</p>
            <button class="btn btn-danger" id="factory-reset-btn">Factory Reset</button>
            <p id="reset-status" style="font-size:13px;margin-top:8px;display:none"></p>
        </div>

        <!-- Camera List -->
        <div class="card">
            <h2>Cameras</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Channel</th>
                        <th>Enabled</th>
                        <th>PTZ</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="camera-table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="/js/admin.js"></script>
</body>
</html>
